name: Daily Scheduled Emails

on:
  schedule:
    - cron: "0 8 * * *"  # Every day at 8am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  run-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Call scheduled emails endpoint
        run: |
          curl -X POST https://rendi-backend.onrender.com/api/internal/run-scheduled-emails/ \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"
